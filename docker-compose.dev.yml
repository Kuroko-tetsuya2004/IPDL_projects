# docker-compose.dev.yml — Environnement minimal (sans Minio ni Ollama)
# Usage : docker compose -f docker-compose.dev.yml up -d

networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge

volumes:
  postgres_data:
    name: ummisco_postgres_data
  redis_data:
    name: ummisco_redis_data
  minio_data:
    name: ummisco_minio_data

services:

  # ── NGINX — Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: ummisco_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./app/public:/var/www/html/public:ro
    networks:
      - frontend_net
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── APP — Laravel PHP-FPM 8.3 ────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ummisco_app
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - ./app/.env
    volumes:
      - ./app:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    networks:
      - frontend_net
      - backend_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t 2>/dev/null && echo ok"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── POSTGRESQL 16 ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ummisco_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ummisco_app
      POSTGRES_USER: ummisco_user
      POSTGRES_PASSWORD: ummisco_secret
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./ummisco_database.sql:/docker-entrypoint-initdb.d/02_schema.sql:ro
    networks:
      - backend_net
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ummisco_user -d ummisco_app"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── REDIS 7 ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ummisco_redis
    restart: unless-stopped
    command: redis-server --requirepass redis_ummisco_secret --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - backend_net
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_ummisco_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── QUEUE WORKER ──────────────────────────────────────────────────────────────
  queue_worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ummisco_queue_worker
    restart: unless-stopped
    working_dir: /var/www/html
    command: ["php", "artisan", "horizon"]
    env_file:
      - ./app/.env
    volumes:
      - ./app:/var/www/html
    networks:
      - backend_net
    depends_on:
      - postgres
      - redis

  # ── SCHEDULER ─────────────────────────────────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ummisco_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: ["/bin/sh", "-c", "while true; do php artisan schedule:run >> /tmp/scheduler.log 2>&1; sleep 60; done"]
    env_file:
      - ./app/.env
    volumes:
      - ./app:/var/www/html
    networks:
      - backend_net
    depends_on:
      - postgres
      - redis

  # ── KEYCLOAK 24 — Serveur d'authentification ──────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: ummisco_keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin_secret
    ports:
      - "8180:8080"   # Interface admin : http://localhost:8180
    networks:
      - backend_net
      - frontend_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── MINIO — Stockage d'objets S3 ────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: ummisco_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_secret_2024
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - backend_net
      - frontend_net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 3
